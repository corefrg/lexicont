repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (formatter)
        entry: ruff format
        language: system
        types_or: [python, jupyter]
        require_serial: true

      - id: ruff-check
        name: ruff check (linter + autofix)
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, jupyter]
        require_serial: true

      # - id: mypy
      #   name: mypy (strict type checking)
      #   entry: mypy src tests
      #   language: system
      #   types: [python]
      #   pass_filenames: false