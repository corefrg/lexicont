version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexicont_qdrant
    ports:
      - "6333:6333"   
      - "6334:6334"   
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - lexicont_net

  lexicont:
    build: .
    container_name: lexicont_app
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - LLAMA_CPP_URL=http://host.docker.internal:11434/v1/chat/completions
      - OLLAMA_URL=http://host.docker.internal:11434/v1/chat/completions
    volumes:
      - ./src:/app/src
      - ./src/lexicont/config:/app/src/lexicont/config:ro
      # - ./logs:/app/logs
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - lexicont_net

networks:
  lexicont_net:
    driver: bridge

volumes:
  qdrant_storage: